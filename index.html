<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WebXR AI Robot with Sun</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>

    <a-scene webxr="optionalFeatures: local-floor, bounded-floor;">
        
        <a-assets>
            </assets>

        <a-light type="ambient" color="#666"></a-light>

        <a-sphere id="sun" position="3 4 -5" radius="0.6" color="#FFD700"
                  animation="property: material.color; to: #FF8C00; dir: alternate; dur: 2000; loop: true">
        </a-sphere>

        <a-light type="directional" color="#FFF" intensity="0.8" position="3 4 -5" castShadow="true"></a-light>


        <a-entity id="robot" position="0 0.5 -4">
            <a-box id="robot-head" position="0 1.2 0" width="0.6" height="0.5" depth="0.5" color="#ECEFF1">
                <a-sphere position="-0.15 0.05 0.26" radius="0.06" color="#00E5FF"></a-sphere>
                <a-sphere position="0.15 0.05 0.26" radius="0.06" color="#00E5FF"></a-sphere>
            </a-box>
            <a-box id="robot-body" position="0 0.4 0" width="0.8" height="0.9" depth="0.6" color="#B0BEC5"></a-box>
            <a-cylinder position="-0.2 -0.3 0" radius="0.1" height="0.5" color="#37474F"></a-cylinder>
            <a-cylinder position="0.2 -0.3 0" radius="0.1" height="0.5" color="#37474F"></a-cylinder>
        </a-entity>


        <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#7CB342" receiveShadow="true"></a-plane>

        <a-sky color="#87CEEB"></a-sky>

        <a-entity id="rig" position="0 0 0">
            <a-camera position="0 1.6 0" look-controls>
                <a-cursor id="cursor"
                          animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1"
                          animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 1500; from: 1 1 1; to: 0.1 0.1 0.1"
                          event-set__mouseenter="_event: mouseenter; color: springgreen"
                          event-set__mouseleave="_event: mouseleave; color: black"
                          raycaster="objects: .clickable">
                </a-cursor>
            </a-camera>
        </a-entity>

        <a-plane position="0 2.2 -3.8" width="2.5" height="0.6" color="#333" opacity="0.85">
            <a-text value="Hello! I am Gemini Robot." align="center" position="0 0 0.01" width="4" color="#FFF"></a-text>
        </a-plane>

    </a-scene>

    </body>
</html>
