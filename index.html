<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebXR Robot with Directional Sun Light</title>
    <meta name="description" content="WebXR Robot App">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script>
      // 視線選択（Gaze）でボタンを選択したときの共通処理
      AFRAME.registerComponent('gaze-button', {
        init: function () {
          var el = this.el;
          el.addEventListener('click', function () {
            // ボタンのテキストを取得
            var textEl = el.querySelector('[text]');
            var action = textEl ? textEl.getAttribute('text').value : '';
            
            // ユーザー入力としてロボット処理関数に渡す
            if (window.handleUserInput) {
              window.handleUserInput(action);
            }
          });
          
          // ホバー時の視覚フィードバック
          el.addEventListener('mouseenter', function () {
            el.setAttribute('material', 'color', '#66ccff');
          });
          el.addEventListener('mouseleave', function () {
            el.setAttribute('material', 'color', '#333333');
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene>
      <a-assets></a-assets>

      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor
          id="cursor"
          animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"
          animation__fusing="property: fusing; startEvents: fusing; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1500"
          event-set__mouseenter="_event: mouseenter; color: springgreen"
          event-set__mouseleave="_event: mouseleave; color: black"
          raycaster="objects: .clickable">
        </a-cursor>
      </a-entity>

      <a-light type="ambient" color="#ffffff" intensity="0.4"></a-light>

      <a-sphere id="sun-visual" position="5 8 -10" radius="1.5" color="#ffaa00" material="shader: flat"></a-sphere>

      <a-light type="directional" color="#ffffff" intensity="0.8" position="5 8 -10" target="#robot-body"></a-light>

      <a-sky color="#87CEEB"></a-sky>
      <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#7BC8A4"></a-plane>

      <a-entity position="0 0 -3.5">
        
        <a-entity 
          id="robot-text-ui"
          position="0 2.5 0" 
          text="value: Robot: Look at the options and select!; align: center; width: 4; color: #ffffff; backgroundColor: #222222; backgroundOpacity: 0.8">
        </a-entity>

        <a-entity position="0 2.0 0">
          <a-mixin id="btn-layout" geometry="primitive: plane; width: 0.8; height: 0.3" material="color: #333333; opacity: 0.9" class="clickable" gaze-button></a-mixin>
          
          <a-entity mixin="btn-layout" position="-1.3 0 0">
            <a-entity text="value: 褒める; align: center; width: 3; color: #ffffff"></a-entity>
          </a-entity>
          
          <a-entity mixin="btn-layout" position="-0.4 0 0">
            <a-entity text="value: 叱る; align: center; width: 3; color: #ffffff"></a-entity>
          </a-entity>
          
          <a-entity mixin="btn-layout" position="0.4 0 0">
            <a-entity text="value: 挨拶; align: center; width: 3; color: #ffffff"></a-entity>
          </a-entity>
          
          <a-entity mixin="btn-layout" position="1.3 0 0">
            <a-entity text="value: 遊ぶ; align: center; width: 3; color: #ffffff"></a-entity>
          </a-entity>
        </a-entity>

        <a-entity id="robot" position="0 0 0">
          <a-cylinder id="robot-body" position="0 0.9 0" radius="0.4" height="0.8" color="#cccccc"></a-cylinder>
          
          <a-cylinder id="robot-neck" position="0 1.35 0" radius="0.1" height="0.1" color="#999999"></a-cylinder>
          
          <a-box id="robot-head" position="0 1.7 0" width="0.6" height="0.6" depth="0.6" color="#eeeeee">
            <a-sphere id="eye-left" position="-0.15 0.1 0.31" radius="0.06" color="#333333"></a-sphere>
            <a-sphere id="eye-right" position="0.15 0.1 0.31" radius="0.06" color="#333333"></a-sphere>
            <a-box id="robot-mouth" position="0 -0.1 0.31" width="0.2" height="0.05" depth="0.01" color="#333333"></a-box>
          </a-box>

          <a-box id="arm-left" position="-0.55 0.9 0" width="0.15" height="0.6" depth="0.15" color="#999999"></a-box>
          <a-box id="arm-right" position="0.55 0.9 0" width="0.15" height="0.6" depth="0.15" color="#999999"></a-box>
          <a-cylinder id="leg-left" position="-0.2 0.25 0" radius="0.1" height="0.5" color="#666666"></a-cylinder>
          <a-cylinder id="leg-right" position="0.2 0.25 0" radius="0.1" height="0.5" color="#666666"></a-cylinder>
        </a-entity>

        <a-entity id="flower-field"></a-entity>
      </a-entity>
    </a-scene>

    <script>
      // ※ 公開サーバーにアップする際は、セキュリティのためAPIキーの直書きを避け、バックエンド経由にしてください。
      const GEMINI_API_KEY = "YOUR_GEMINI_API_KEY_HERE"; 

      // 1000本のお花を生成するスクリプト（薄い円柱3つを重ねて軽量化）
      const field = document.getElementById('flower-field');
      const flowerCount = 1000;

      for (let i = 0; i < flowerCount; i++) {
        const flowerGroup = document.createElement('a-entity');
        
        // ロボットの周り（半径1.5m〜15m）にランダム配置
        const angle = Math.random() * Math.PI * 2;
        const distance = 1.5 + Math.random() * 13.5;
        const x = Math.cos(angle) * distance;
        const z = Math.sin(angle) * distance;
        flowerGroup.setAttribute('position', `${x} 0 ${z}`);

        // 茎（サイズ2倍：radius 0.01, height 0.3）
        const stem = document.createElement('a-cylinder');
        stem.setAttribute('radius', '0.01');
        stem.setAttribute('height', '0.3');
        stem.setAttribute('position', '0 0.15 0');
        stem.setAttribute('color', '#4CAF50');
        flowerGroup.appendChild(stem);

        // 葉っぱ1（サイズ2倍：radius 0.006, height 0.08）
        const leaf1 = document.createElement('a-cylinder');
        leaf1.setAttribute('radius', '0.006');
        leaf1.setAttribute('height', '0.08');
        leaf1.setAttribute('position', '0.03 0.15 0');
        leaf1.setAttribute('rotation', '0 0 45');
        leaf1.setAttribute('color', '#2E7D32');
        flowerGroup.appendChild(leaf1);

        // 葉っぱ2（サイズ2倍：radius 0.006, height 0.08）
        const leaf2 = document.createElement('a-cylinder');
        leaf2.setAttribute('radius', '0.006');
        leaf2.setAttribute('height', '0.08');
        leaf2.setAttribute('position', '-0.03 0.2 0');
        leaf2.setAttribute('rotation', '0 0 -45');
        leaf2.setAttribute('color', '#2E7D32');
        flowerGroup.appendChild(leaf2);

        // 花びら（サイズ2倍：3つの薄い円柱を重ねてアスタリスク形状にして軽量化）
        const colors = ['#FF4081', '#FFEB3B', '#00BCD4', '#9C27B0', '#FF5722'];
        const pColor = colors[Math.floor(Math.random() * colors.length)];
        
        // 花びらのベースサイズ（2倍：radius 0.08, height 0.01）
        const pRadius = "0.08";
        const pHeight = "0.01";

        for (let r = 0; r < 3; r++) {
          const petal = document.createElement('a-cylinder');
          petal.setAttribute('radius', pRadius);
          petal.setAttribute('height', pHeight);
          petal.setAttribute('color', pColor);
          petal.setAttribute('position', '0 0.3 0');
          // 角度をずらして重ねる
          petal.setAttribute('rotation', `90 ${r * 60} 0`);
          flowerGroup.appendChild(petal);
        }

        // 花の中心（サイズ2倍：radius 0.024, height 0.012）
        const center = document.createElement('a-cylinder');
        center.setAttribute('radius', '0.024');
        center.setAttribute('height', '0.012');
        center.setAttribute('color', '#FFFFFF');
        center.setAttribute('position', '0 0.3 0.01');
        center.setAttribute('rotation', '90 0 0');
        flowerGroup.appendChild(center);

        field.appendChild(flowerGroup);
      }

      // ユーザー入力を処理してGemini APIに投げる関数
      window.handleUserInput = async function(text) {
        if (!text) return;
        
        const textUi = document.getElementById('robot-text-ui');
        textUi.setAttribute('text', 'value: Robot: 考えて中...; align: center; width: 4; color: #ffffff; backgroundColor: #222222; backgroundOpacity: 0.8');

        // モーションの初期化
        resetRobotMotion();

        try {
          // Gemini API リクエストの構築
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{
                parts: [{
                  text: `あなたは感情を持った卓上ロボットです。ユーザーから「${text}」と言われました。
                  以下のJSONフォーマットのみで返答してください。他の文章は一切含めないでください。
                  {
                    "emotion": "喜か怒か哀か楽か、それ以外なら不",
                    "reply": "ロボットらしい100文字以内の返答メッセージ"
                  }`
                }]
              }]
            })
          });

          if (!response.ok) throw new Error('API通信エラー');
          
          const data = await response.json();
          const jsonText = data.candidates[0].content.parts[0].text.trim();
          // プレーンなJSONをパース
          const result = JSON.parse(jsonText.replace(/```json|```/g, ''));

          // UIに返答を表示
          textUi.setAttribute('text', `value: Robot: ${result.reply}; align: center; width: 4; color: #ffffff; backgroundColor: #222222; backgroundOpacity: 0.8`);
          
          // 感情に応じたモーションを実行
          playEmotionMotion(result.emotion);

        } catch (error) {
          console.error(error);
          textUi.setAttribute('text', 'value: Robot: (通信エラーが起きちゃったみたい...); align: center; width: 4; color: #ffffff; backgroundColor: #222222; backgroundOpacity: 0.8');
          // エラー時は「不（不思議そう）」のモーション
          playEmotionMotion('不');
        }
      };

      // ロボットの各パーツをアニメーションさせる関数
      function playEmotionMotion(emotion) {
        const head = document.getElementById('robot-head');
        const eyeLeft = document.getElementById('eye-left');
        const eyeRight = document.getElementById('eye-right');

        if (emotion === '喜') {
          // 喜び：頭を上下にピョコピョコ動かす
          head.setAttribute('animation', 'property: position; to: 0 1.9 0; dur: 300; dir: alternate; loop: 4');
          eyeLeft.setAttribute('material', 'color', '#ff4081');
          eyeRight.setAttribute('material', 'color', '#ff4081');
        } else if (emotion === '怒') {
          // 怒り：頭を左右に激しく揺らす
          head.setAttribute('animation', 'property: rotation; to: 0 0 15; dur: 100; dir: alternate; loop: 6');
          eyeLeft.setAttribute('material', 'color', '#ff0000');
          eyeRight.setAttribute('material', 'color', '#ff0000');
        } else if (emotion === '哀') {
          // 悲しみ：頭をがっくりうつむかせる
          head.setAttribute('animation', 'property: rotation; to: 20 0 0; dur: 1000; loop: false');
          eyeLeft.setAttribute('material', 'color', '#00bcd4');
          eyeRight.setAttribute('material', 'color', '#00bcd4');
        } else if (emotion === '楽') {
          // 楽しい：頭をくるくる回転させる
          head.setAttribute('animation', 'property: rotation; to: 0 360 0; dur: 800; loop: 2');
          eyeLeft.setAttribute('material', 'color', '#ffeb3b');
          eyeRight.setAttribute('material', 'color', '#ffeb3b');
        } else {
          // 不思議・エラー：首をかしげる
          head.setAttribute('animation', 'property: rotation; to: 0 0 -20; dur: 500; loop: false');
          eyeLeft.setAttribute('material', 'color', '#9c27b0');
          eyeRight.setAttribute('material', 'color', '#9c27b0');
        }
      }

      // モーションと目の色を元に戻す関数
      function resetRobotMotion() {
        const head = document.getElementById('robot-head');
        const eyeLeft = document.getElementById('eye-left');
        const eyeRight = document.getElementById('eye-right');
        
        head.removeAttribute('animation');
        head.setAttribute('position', '0 1.7 0');
        head.setAttribute('rotation', '0 0 0');
        eyeLeft.setAttribute('material', 'color', '#333333');
        eyeRight.setAttribute('material', 'color', '#333333');
      }
    </script>
  </body>
</html>
