<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WebXR AI Robot App</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <a-scene webxr="optionalFeatures: hit-test;">
        
        <script>
            // Gemini APIの設定（※公開時はバックエンド経由にすることを強く推奨します）
            const API_KEY = "YOUR_GEMINI_API_KEY_HERE"; 
            const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`;

            // ロボットの各パーツのIDを取得
            let head, bodyMesh, leftArm, rightArm, facePlane, textPanel;

            window.onload = () => {
                head = document.getElementById('robot-head');
                bodyMesh = document.getElementById('robot-body');
                leftArm = document.getElementById('robot-left-arm');
                rightArm = document.getElementById('robot-right-arm');
                facePlane = document.getElementById('robot-face');
                textPanel = document.getElementById('text-panel');
            };

            // アニメーション（モーション）の初期化用関数
            function clearAnimations() {
                head.removeAttribute('animation');
                bodyMesh.removeAttribute('animation');
                leftArm.removeAttribute('animation');
                rightArm.removeAttribute('animation');
            }

            // モモーション発動関数
            function playMotion(emotion) {
                clearAnimations();

                if (emotion === "喜") {
                    // 顔の色をオレンジに
                    facePlane.setAttribute('material', 'color', '#ffaa00');
                    // 跳ねるようなアニメーション
                    bodyMesh.setAttribute('animation', 'property: position; to: 0 1.2 -4; dur: 300; dir: alternate; loop: 4; easing: easeInOutQuad');
                    leftArm.setAttribute('animation', 'property: rotation; to: 0 0 120; dur: 300; dir: alternate; loop: 4; easing: easeInOutQuad');
                    rightArm.setAttribute('animation', 'property: rotation; to: 0 0 -120; dur: 300; dir: alternate; loop: 4; easing: easeInOutQuad');
                } 
                else if (emotion === "怒") {
                    // 顔の色を赤に
                    facePlane.setAttribute('material', 'color', '#ff0000');
                    // 激しく震えるアニメーション
                    head.setAttribute('animation', 'property: rotation; to: 0 10 0; dur: 50; dir: alternate; loop: 10');
                    bodyMesh.setAttribute('animation', 'property: rotation; to: 0 5 0; dur: 50; dir: alternate; loop: 10');
                } 
                else if (emotion === "哀") {
                    // 顔の色を青に
                    facePlane.setAttribute('material', 'color', '#0000ff');
                    // うつむくアニメーション
                    head.setAttribute('animation', 'property: rotation; to: 20 0 0; dur: 1000; easing: easeInOutQuad; fill: forwards');
                    leftArm.setAttribute('animation', 'property: rotation; to: 0 0 15; dur: 1000; easing: easeInOutQuad; fill: forwards');
                    rightArm.setAttribute('animation', 'property: rotation; to: 0 0 -15; dur: 1000; easing: easeInOutQuad; fill: forwards');
                } 
                else if (emotion === "楽") {
                    // 顔の色を黄色に
                    facePlane.setAttribute('material', 'color', '#ffff00');
                    // 左右に体を揺らすダンスアニメーション
                    bodyMesh.setAttribute('animation', 'property: rotation; to: 0 0 10; dur: 400; dir: alternate; loop: 6; easing: easeInOutQuad');
                    head.setAttribute('animation', 'property: rotation; to: 0 0 -10; dur: 400; dir: alternate; loop: 6; easing: easeInOutQuad');
                } 
                else {
                    // 不思議そう（分類不能・エラー時など）
                    facePlane.setAttribute('material', 'color', '#888888');
                    // 首を傾げるアニメーション
                    head.setAttribute('animation', 'property: rotation; to: 0 0 15; dur: 800; dir: alternate; loop: 2; easing: easeInOutQuad');
                }
            }

            // 視線クリック（Gaze）で選択された定型文を送信する処理
            async function sendPresetMessage(text) {
                if(API_KEY === "YOUR_GEMINI_API_KEY_HERE") {
                    textPanel.setAttribute('value', 'エラー: APIキーが設定されていません。\nソースコード内のAPI_KEYを設定してください。');
                    playMotion("エラー");
                    return;
                }

                textPanel.setAttribute('value', `あなた: ${text}\n\n思考中...`);

                // Gemini APIに送るプロンプトの構築（感情分類を強制する）
                const prompt = `ユーザーはロボットであるあなたに「${text}」と話しかけました。
以下のルールを厳守して日本語で返答してください。
1. 返答の1行目には、ユーザーの言葉に対するあなたの感情を【喜】【怒】【哀】【楽】【？】のいずれか1文字だけで表してください。
2. 2行目は空行にしてください。
3. 3行目以降に、ロボットとしてのフレンドリーな返答文を書いてください。

出力例：
【喜】

話しかけてくれてありがとう！とっても嬉しいな！`;

                try {
                    const response = await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });

                    const data = await response.json();
                    const resText = data.candidates[0].content.parts[0].text;

                    // 1行目から感情を抽出
                    const emotionMatch = resText.match(/【(喜|怒|哀|楽|？)】/);
                    let emotion = "？";
                    let replyMessage = resText;

                    if (emotionMatch) {
                        emotion = emotionMatch[1];
                        // 【感情】の部分を削って返メッセージのみにする
                        replyMessage = resText.replace(/【.*】\n*/, '').trim();
                    }

                    // テキストパネルに表示（ユーザー発言＋ロボットの返答）
                    textPanel.setAttribute('value', `あなた: ${text}\n\nロボット: ${replyMessage}`);
                    
                    // アニメーションを実行
                    playMotion(emotion);

                } catch (error) {
                    console.error(error);
                    textPanel.setAttribute('value', "通信エラーが発生したよ。\nもう一度試してみてね。");
                    playMotion("エラー");
                }
            }
        </script>

        <a-light type="ambient" color="#ffffff" intensity="0.4"></a-light>
        
        <a-light type="directional" color="#ffffff" intensity="0.8" position="-4 8 -6" target="#robot-target"></a-light>

        <a-entity camera look-controls position="0 1.6 0">
            <a-entity cursor="fuse: true; fuseTimeout: 1500"
                      position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                      material="color: #ff0000; shader: flat"
                      animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1"
                      animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 1500; from: 1 1 1; to: 0.1 0.1 0.1"
                      animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeInCubic; dur: 500; to: 1 1 1">
            </a-entity>
        </a-entity>

        <a-sphere position="-4 8 -6" radius="0.8" color="#ffaa00" material="shader: flat"></a-sphere>

        <a-sky color="#87CEEB"></a-sky>

        <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#228B22"></a-plane>

        <a-entity position="0 0 -2">
            <a-sphere position="-1.5 0.1 -0.5" radius="0.15" color="#ff007f"></a-sphere>
            <a-sphere position="-0.7 0.1 -0.2" radius="0.12" color="#ffaa00"></a-sphere>
            <a-sphere position="0.8 0.1 -0.6" radius="0.18" color="#ffffff"></a-sphere>
            <a-sphere position="1.4 0.1 -0.3" radius="0.13" color="#9400d3"></a-sphere>
        </a-entity>

        <a-entity id="robot-target" position="0 0 -4">
            
            <a-entity id="robot-body" geometry="primitive: box; width: 0.8; height: 1.0; depth: 0.6" material="color: #dddddd" position="0 1.0 0">
                
                <a-entity id="robot-head" geometry="primitive: box; width: 0.6; height: 0.4; depth: 0.4" material="color: #aaaaaa" position="0 0.8 0">
                    <a-plane id="robot-face" position="0 0 0.21" width="0.5" height="0.3" color="#888888" shader="flat"></a-plane>
                    <a-sphere position="-0.15 0.05 0.22" radius="0.03" color="#ffffff" shader="flat"></a-sphere>
                    <a-sphere position="0.15 0.05 0.22" radius="0.03" color="#ffffff" shader="flat"></a-sphere>
                </a-entity>

                <a-entity id="robot-left-arm" geometry="primitive: cylinder; radius: 0.08; height: 0.6" material="color: #888888" position="-0.5 0.2 0" rotation="0 0 20"></a-entity>
                
                <a-entity id="robot-right-arm" geometry="primitive: cylinder; radius: 0.08; height: 0.6" material="color: #888888" position="0.5 0.2 0" rotation="0 0 -20"></a-entity>

                <a-entity id="robot-left-leg" geometry="primitive: cylinder; radius: 0.1; height: 0.5" material="color: #555555" position="-0.25 -0.7 0"></a-entity>

                <a-entity id="robot-right-leg" geometry="primitive: cylinder; radius: 0.1; height: 0.5" material="color: #555555" position="0.25 -0.7 0"></a-entity>

            </a-entity>
        </a-entity>

        <a-entity position="0 2.5 -3.2">
            
            <a-text id="text-panel" 
                    value="ロボットに話しかけてみよう！\n下の選択肢を1.5秒間見つめると送信されるよ。" 
                    align="center" color="#ffffff" background-color="#111111" width="3.5" wrap-count="25"
                    position="0 0.5 0">
            </a-text>

            <a-entity position="-1.0 -0.2 0" class="clickable"
                      onclick="sendPresetMessage('いつもありがとう！本当にすごいね！')">
                <a-plane width="0.9" height="0.25" color="#4CC3D9"></a-plane>
                <a-text value="ほめる" align="center" color="#ffffff" width="2.5" position="0 0 0.01"></a-text>
            </a-entity>

            <a-entity position="0 -0.2 0" class="clickable"
                      onclick="sendPresetMessage('こら！ちゃんとお仕事して！')">
                <a-plane width="0.9" height="0.25" color="#FF3B30"></a-plane>
                <a-text value="おこる" align="center" color="#ffffff" width="2.5" position="0 0 0.01"></a-text>
            </a-entity>

            <a-entity position="1.0 -0.2 0" class="clickable"
                      onclick="sendPresetMessage('元気を出して、明日はきっといい日になるよ')">
                <a-plane width="0.9" height="0.25" color="#FFCC00"></a-plane>
                <a-text value="なぐさめる" align="center" color="#333333" width="2.5" position="0 0 0.01"></a-text>
            </a-entity>
            
        </a-entity>

    </a-scene>
</body>
</html>
