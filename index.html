<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>5つの感情表現ロボット【WebXR】</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        /* 読み込み中などのエラー表示用（WebXRモード外用） */
        #error-overlay {
            position: absolute; top: 10px; left: 10px; z-index: 10;
            color: red; background: rgba(0,0,0,0.7); padding: 5px;
            display: none; font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div id="error-overlay"></div>

    <a-scene xr-mode-ui="enabled: true">
        
        <a-light type="ambient" color="#ffffff" intensity="0.4"></a-light>

        <a-sphere id="sun" position="-4 8 -6" radius="0.6" color="#ffaa00"
                  material="shader: flat; emissive: #ffaa00; emissiveIntensity: 2">
        </a-sphere>

        <a-light type="directional" color="#fff" intensity="0.8" 
                 position="-4 8 -6" 
                 castShadow="true"
                 shadow-camera-left="-5" shadow-camera-right="5"
                 shadow-camera-top="5" shadow-camera-bottom="-5">
        </a-light>

        <a-plane position="0 0 -4" rotation="-90 0 0" width="100" height="100" color="#7BC8A4" receive-shadow="true"></a-plane>
        <a-sky color="#ECEFF1"></a-sky>

        <a-entity id="rig" position="0 0 0">
            <a-camera look-controls wasd-controls="enabled: true">
                <a-cursor id="cursor"
                          animation__click="property: scale; startEvents: click; easing: easeInCubic; durability: 150; from: 0.1 0.1 0.1; to: 1 1 1"
                          animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; durability: 1500; from: 1 1 1; to: 0.1 0.1 0.1"
                          event-set__mouseenter="_event: mouseenter; color: springgreen"
                          event-set__mouseleave="_event: mouseleave; color: black"
                          raycaster="objects: .clickable"
                          color="#222"
                          background-color="#FFF"
                          opacity="0.8"
                          scale="1 1 1">
                </a-cursor>
            </a-camera>
        </a-entity>

        <a-entity id="robot" position="0 0.5 -4" shadow="cast: true; receive: true">
            <a-box id="head" position="0 1.2 0" width="0.6" height="0.5" depth="0.5" color="#ECEFF1">
                <a-box id="eye-l" position="-0.15 0.05 0.26" width="0.1" height="0.1" depth="0.02" color="#00E5FF"></a-box>
                <a-box id="eye-r" position="0.15 0.05 0.26" width="0.1" height="0.1" depth="0.02" color="#00E5FF"></a-box>
                <a-box id="mouth" position="0 -0.1 0.26" width="0.3" height="0.05" depth="0.02" color="#37474F"></a-box>
            </a-box>

            <a-box id="body" position="0 0.5 0" width="0.8" height="0.8" depth="0.6" color="#B0BEC5">
                <a-sphere id="heart-lamp" position="0 0.2 0.31" radius="0.08" color="#00E5FF"></a-sphere>
            </a-box>

            <a-box id="arm-l" position="-0.55 0.6 0" width="0.15" height="0.6" depth="0.15" color="#CFD8DC" pivot="0.075 0.3 0"></a-box>
            
            <a-box id="arm-r" position="0.55 0.6 0" width="0.15" height="0.6" depth="0.15" color="#CFD8DC" pivot="-0.075 0.3 0"></a-box>

            <a-cylinder id="leg-l" position="-0.2 -0.1 0" radius="0.1" height="0.4" color="#37474F"></a-cylinder>
            
            <a-cylinder id="leg-r" position="0.2 -0.1 0" radius="0.1" height="0.4" color="#37474F"></a-cylinder>
        </a-entity>

        <a-plane id="msg-board" position="0 2.5 -3.8" width="2.5" height="0.6" color="#263238" opacity="0.95">
            <a-text id="robot-text" value="ボクを見つめて、したのボタンから\nことばを かけてみてね！" 
                    align="center" color="#FFFFFF" width="2.2" font="k領" position="0 0 0.01"></a-text>
        </a-plane>

        <a-entity id="ui-buttons" position="0 1.2 -3.0">
            <a-plane class="clickable" id="btn-praise" position="-0.8 0 0" width="0.6" height="0.25" color="#4CAF50"
                     animation__hover="property: scale; to: 1.1 1.1 1.1; startEvents: mouseenter; durability: 200"
                     animation__leave="property: scale; to: 1 1 1; startEvents: mouseleave; durability: 200">
                <a-text value="ほめる" align="center" color="#FFF" width="2" position="0 0 0.01"></a-text>
            </a-plane>

            <a-plane class="clickable" id="btn-scold" position="-0.2 0 0" width="0.6" height="0.25" color="#F44336"
                     animation__hover="property: scale; to: 1.1 1.1 1.1; startEvents: mouseenter; durability: 200"
                     animation__leave="property: scale; to: 1 1 1; startEvents: mouseleave; durability: 200">
                <a-text value="しかる" align="center" color="#FFF" width="2" position="0 0 0.01"></a-text>
            </a-plane>

            <a-plane class="clickable" id="btn-comfort" position="0.4 0 0" width="0.6" height="0.25" color="#2196F3"
                     animation__hover="property: scale; to: 1.1 1.1 1.1; startEvents: mouseenter; durability: 200"
                     animation__leave="property: scale; to: 1 1 1; startEvents: mouseleave; durability: 200">
                <a-text value="なぐさめる" align="center" color="#FFF" width="2" position="0 0 0.01"></a-text>
            </a-plane>

            <a-plane class="clickable" id="btn-greet" position="1.0 0 0" width="0.6" height="0.25" color="#FF9800"
                     animation__hover="property: scale; to: 1.1 1.1 1.1; startEvents: mouseenter; durability: 200"
                     animation__leave="property: scale; to: 1 1 1; startEvents: mouseleave; durability: 200">
                <a-text value="あいさつ" align="center" color="#FFF" width="2" position="0 0 0.01"></a-text>
            </a-plane>
        </a-entity>

    </a-scene>

    <script>
        // 【重要】ご自身のGemini APIキーをここにセットしてください
        const GEMINI_API_KEY = "YOUR_GEMINI_API_KEY"; 
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}`;

        // DOM要素の取得
        const robotText = document.querySelector('#robot-text');
        const errorOverlay = document.querySelector('#error-overlay');
        const robot = document.querySelector('#robot');
        const head = document.querySelector('#head');
        const armL = document.querySelector('#arm-l');
        const armR = document.querySelector('#arm-r');
        const eyeL = document.querySelector('#eye-l');
        const eyeR = document.querySelector('#eye-r');
        const heartLamp = document.querySelector('#heart-lamp');

        // アニメーションタイマー管理用配列
        let activeTimers = [];

        // 共通：既存のカスタムモーションアニメーションをクリアする関数
        function resetRobotAnimations() {
            activeTimers.forEach(timer => clearTimeout(timer));
            activeTimers = [];
            
            // 各種パーツの属性初期化
            head.removeAttribute('animation');
            armL.removeAttribute('animation');
            armR.removeAttribute('animation');
            robot.removeAttribute('animation');
            
            // 初期姿勢に戻す
            head.setAttribute('rotation', '0 0 0');
            head.setAttribute('position', '0 1.2 0');
            armL.setAttribute('rotation', '0 0 0');
            armR.setAttribute('rotation', '0 0 0');
            robot.setAttribute('position', '0 0.5 -4');
            eyeL.setAttribute('color', '#00E5FF');
            eyeR.setAttribute('color', '#00E5FF');
            heartLamp.setAttribute('color', '#00E5FF');
        }

        // 感情に応じたロボットのモーション発動ファンクション
        function playEmotionMotion(emotion) {
            resetRobotAnimations();

            if (emotion === "喜") {
                // 目の色をピンク、ランプを黄色にして大喜びでジャンプ
                eyeL.setAttribute('color', '#FF4081');
                eyeR.setAttribute('color', '#FF4081');
                heartLamp.setAttribute('color', '#FFEB3B');
                
                robot.setAttribute('animation', 'property: position; to: 0 0.9 -4; dir: alternate; dur: 250; loops: 4; easing: easeOutQuad');
                armL.setAttribute('animation', 'property: rotation; to: 0 0 140; dir: alternate; dur: 250; loops: 4');
                armR.setAttribute('animation', 'property: rotation; to: 0 0 -140; dir: alternate; dur: 250; loops: 4');

            } else if (emotion === "怒") {
                // 目とランプを赤くし、体を激しく左右に震わせる
                eyeL.setAttribute('color', '#FF1744');
                eyeR.setAttribute('color', '#FF1744');
                heartLamp.setAttribute('color', '#FF1744');

                head.setAttribute('animation', 'property: rotation; to: 0 0 10; dir: alternate; dur: 50; loops: 20');
                robot.setAttribute('animation', 'property: position; to: 0.05 0.5 -4; dir: alternate; dur: 50; loops: 20');

            } else if (emotion === "哀") {
                // 目を青紫にし、うつむいてガタガタと悲しそうにする
                eyeL.setAttribute('color', '#3F51B5');
                eyeR.setAttribute('color', '#3F51B5');
                heartLamp.setAttribute('color', '#795548');

                head.setAttribute('animation', 'property: rotation; to: 25 0 0; dur: 500; easing: easeOutQuad');
                armL.setAttribute('animation', 'property: rotation; to: 0 0 30; dur: 500');
                armR.setAttribute('animation', 'property: rotation; to: 0 0 -30; dur: 500');

            } else if (emotion === "楽") {
                // 緑のランプで、首をパタパタと楽しそうに傾けるピョコピョコモーション
                eyeL.setAttribute('color', '#00E676');
                eyeR.setAttribute('color', '#00E676');
                heartLamp.setAttribute('color', '#00E676');

                head.setAttribute('animation', 'property: rotation; to: 0 0 15; dir: alternate; dur: 300; loops: 6; easing: linear');
                robot.setAttribute('animation', 'property: position; to: 0 0.6 -4; dir: alternate; dur: 300; loops: 6');

            } else {
                // 通信エラーまたは分類不能（不思議そうに首をひねる）
                eyeL.setAttribute('color', '#FFCC00');
                eyeR.setAttribute('color', '#FFCC00');
                head.setAttribute('animation', 'property: rotation; to: 0 20 15; dur: 600; easing: easeOutQuad');
            }
        }

        // Gemini APIを叩いておしゃべりと感情分析を同時に行う関数
        async function talkToAI(userMessage) {
            // 送信中はテキストボードを待機状態にする
            robotText.setAttribute('value', 'かんがえちゅう...');
            errorOverlay.style.display = 'none';

            // プロンプトの構築（テキストの返答と感情分類を特定のJSON風フォーマットで強制する）
            const prompt = `
あなたは小さなかわいいお世話ロボットです。
ユーザーから「${userMessage}」と言われました。
親しみやすい口調で、20文字〜40文字程度で可愛くお返事してください。
また、その時のあなたの感情を「喜・怒・哀・楽・無」の5つのうち必ずどれか1文字で判定してください。

出力は必ず以下のフォーマット（JSON形式）のみで返答してください。余計な挨拶や解説は一切含めないでください。
{"reply": "ロボットのお返事文", "emotion": "感情の1文字"}
`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                if (!response.ok) {
                    throw new Error(`APIアクセスエラー: Status ${response.status}`);
                }

                const data = await response.json();
                const aiResultText = data.candidates[0].content.parts[0].text.trim();
                
                // 返ってきたJSONテキストを解析
                const jsonResponse = JSON.parse(aiResultText);
                
                // ボードにテキストを表示し、モーションを実行
                robotText.setAttribute('value', jsonResponse.reply);
                playEmotionMotion(jsonResponse.emotion);

            } catch (err) {
                console.error(err);
                robotText.setAttribute('value', 'うーん、うまく繋がらないみたい…？');
                playEmotionMotion("エラー");
                
                // 画面左上（WebXR外）に開発者用のエラー詳細を少し出す
                errorOverlay.textContent = `エラー詳細: ${err.message}. APIキーが正しいか確認してください。`;
                errorOverlay.style.display = 'block';
            }
        }

        // ボタンのクリックイベント（視線クリック）の設定
        document.querySelector('#btn-praise').addEventListener('click', () => talkToAI('すごいね！いつもありがとう！'));
        document.querySelector('#btn-scold').addEventListener('click', () => talkToAI('だめでしょ！こら！'));
        document.querySelector('#btn-comfort').addEventListener('click', () => talkToAI('元気出して、大丈夫だよ。'));
        document.querySelector('#btn-greet').addEventListener('click', () => talkToAI('こんにちは！あそぼう！'));

    </script>
</body>
</html>
