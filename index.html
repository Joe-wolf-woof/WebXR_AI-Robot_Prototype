<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 Emotion Robots - Sunbeam and Concentric Flower Field WebXR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script>
        // 視線カーソル用コンポーネント
        AFRAME.registerComponent('clickable-btn', {
            init: function () {
                this.el.addEventListener('mouseenter', () => {
                    this.el.setAttribute('color', '#FFD700');
                });
                this.el.addEventListener('mouseleave', () => {
                    this.el.setAttribute('color', '#FFFFFF');
                });
            }
        });

        // ページ読み込み完了時、ロボットを中心に同心円状のお花を配置するスクリプト
        window.addEventListener('DOMContentLoaded', () => {
            const flowerField = document.getElementById('flower-field');
            const flowerColors = ['#FF3E96', '#FF3636', '#FF69B4', '#FFA500', '#9B30FF', '#00BFFF', '#7B68EE', '#FFFFFF', '#FFD700'];
            
            const totalFlowers = 1000;
            const rings = 15; // 同心円の層の数

            // ロボットの座標 (0, 0, -2.5) を中心にするための基準値
            const centerX = 0;
            const centerZ = -2.5;

            let flowerCount = 0;
            // UIパネル(z: -1.2)に大きな花が被らないよう、開始半径は 2.0 のまま
            for (let r = 0; r < rings; r++) {
                const distance = 2.0 + (r * 0.5); // 各リングの半径の間隔
                const flowersInRing = Math.floor((totalFlowers / rings) * (distance / 4)); // 外側ほど花の数を増やす
                
                for (let i = 0; i < flowersInRing; i++) {
                    if (flowerCount >= totalFlowers) break;

                    // 綺麗な同心円を描くための角度計算
                    const angle = (i / flowersInRing) * Math.PI * 2 + (Math.random() * 0.05);
                    // ロボットの位置(centerX, centerZ)をベースに計算
                    const x = centerX + Math.cos(angle) * distance;
                    const z = centerZ + Math.sin(angle) * distance;
                    const y = 0;

                    // 1つの花をまとめるグループ
                    const flowerGroup = document.createElement('a-entity');
                    flowerGroup.setAttribute('position', `${x} ${y} ${z}`);
                    
                    // 【サイズを2倍に変更】(元の 0.4~0.9 から 0.8~1.8 へ)
                    const scale = (0.4 + Math.random() * 0.5) * 2;
                    flowerGroup.setAttribute('scale', `${scale} ${scale} ${scale}`);

                    // 1. 茎
                    const stem = document.createElement('a-cylinder');
                    const stemHeight = 0.1 + Math.random() * 0.15;
                    stem.setAttribute('radius', '0.008');
                    stem.setAttribute('height', stemHeight);
                    stem.setAttribute('position', `0 ${stemHeight / 2} 0`);
                    stem.setAttribute('color', '#2E8B57');
                    flowerGroup.appendChild(stem);

                    // 2. 花びら
                    const petals = document.createElement('a-cylinder');
                    const randomColor = flowerColors[Math.floor(Math.random() * flowerColors.length)];
                    petals.setAttribute('radius', '0.07');
                    petals.setAttribute('height', '0.01');
                    petals.setAttribute('position', `0 ${stemHeight} 0`);
                    petals.setAttribute('color', randomColor);
                    petals.setAttribute('rotation', `${Math.random() * 10} ${(angle * 180 / Math.PI)} ${Math.random() * 10}`);
                    flowerGroup.appendChild(petals);

                    // 3. 花の中央
                    const center = document.createElement('a-sphere');
                    center.setAttribute('radius', '0.02');
                    center.setAttribute('position', `0 ${stemHeight + 0.01} 0`);
                    center.setAttribute('color', '#FFD700'); 
                    flowerGroup.appendChild(center);

                    // 【追加：葉っぱ】茎の横に緑の小さな球体（楕円形）を配置
                    const leaf = document.createElement('a-sphere');
                    leaf.setAttribute('radius', '0.02');
                    leaf.setAttribute('scale', '2 0.5 1'); // 横長に伸ばして葉っぱらしくする
                    leaf.setAttribute('position', `0.03 ${stemHeight * 0.5} 0`);
                    leaf.setAttribute('rotation', '0 0 20');
                    leaf.setAttribute('color', '#32CD32');
                    flowerGroup.appendChild(leaf);

                    flowerField.appendChild(flowerGroup);
                    flowerCount++;
                }
            }
        });
    </script>
</head>
<body>

    <a-scene xr-mode-ui="enabled: true">
        
        <a-sky color="#87CEEB"></a-sky>

        <a-sphere id="sun" position="5 3 -3" radius="0.8" color="#FFD700"></a-sphere>

        <a-entity light="type: ambient; color: #E0F2FF; intensity: 0.8"></a-entity>
        <a-entity light="type: directional; color: #FFFDF0; intensity: 1.5; castShadow: true" position="5 3 -3"></a-entity>

        <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#3A7D14"></a-plane>
        
        <a-entity id="flower-field"></a-entity>

        <a-entity id="robot-master-container" position="0 0 -2.5">
            <a-entity id="robot-assembly" position="0 0.8 0">
                
                <a-text id="robot-question-mark" 
                        value="?" 
                        position="0 1.6 0" 
                        scale="0 0 0" 
                        color="#FFFFFF" 
                        align="center" 
                        width="7" 
                        font="mozillavr">
                </a-text>

                <a-cylinder position="0 1.1 0" radius="0.01" height="0.2" color="#aaa"></a-cylinder>
                <a-sphere id="robot-antenna-top" position="0 1.2 0" radius="0.04" color="#7BC8A4"></a-sphere>

                <a-entity id="robot-head-group" position="0 0.8 0">
                    <a-box id="robot-head" position="0 0 0" width="0.5" height="0.4" depth="0.4" color="#7BC8A4"></a-box>
                    
                    <a-box id="eye-l" position="-0.12 0.05 0.21" width="0.06" height="0.06" depth="0.01" color="#000"></a-box>
                    <a-box id="eye-r" position="0.12 0.05 0.21" width="0.06" height="0.06" depth="0.01" color="#000"></a-box>
                    <a-box id="mouth" position="0 -0.08 0.21" width="0.25" height="0.04" depth="0.01" color="#000"></a-box>
                </a-entity>

                <a-cylinder position="0 0.55 0" radius="0.06" height="0.1" color="#888"></a-cylinder>

                <a-box id="robot-body" position="0 0.1 0" width="0.7" height="0.8" depth="0.5" color="#7BC8A4"></a-box>
                <a-box position="0 0.1 0.26" width="0.4" height="0.3" depth="0.01" color="#fff" opacity="0.2"></a-box>

                <a-entity id="arm-l-container" position="-0.4 0.4 0">
                    <a-box id="arm-l" position="0 -0.2 0" width="0.1" height="0.5" depth="0.1" color="#888"></a-box>
                </a-entity>
                
                <a-entity id="arm-r-container" position="0.4 0.4 0">
                    <a-box id="arm-r" position="0 -0.2 0" width="0.1" height="0.5" depth="0.1" color="#888"></a-box>
                </a-entity>

                <a-entity id="leg-l-container" position="-0.18 -0.3 0">
                    <a-cylinder id="leg-l" position="0 -0.2 0" radius="0.05" height="0.4" color="#666"></a-cylinder>
                </a-entity>
                <a-entity id="leg-r-container" position="0.18 -0.3 0">
                    <a-cylinder id="leg-r" position="0 -0.2 0" radius="0.05" height="0.4" color="#666"></a-cylinder>
                </a-entity>
            </a-entity>
        </a-entity>

        <a-entity id="vr-ui" position="0 0.6 -1.2" rotation="-15 0 0">
            <a-plane width="1.6" height="0.8" color="#111111" opacity="0.8"></a-plane>
            
            <a-text id="vr-robot-text" 
                    value="Robot: Look at the option and select!" 
                    font="roboto"
                    position="0 0.23 0.03" 
                    align="center" 
                    width="1.4" 
                    color="#FFFFFF">
            </a-text>

            <a-plane class="clickable" clickable-btn position="-0.5 -0.1 0.03" width="0.38" height="0.15" color="#FFFFFF" onclick="talkToRobot('You look amazing today! I love your style!')">
                <a-text value="Praise" font="roboto" align="center" width="2" color="#222222"></a-text>
            </a-plane>

            <a-plane class="clickable" clickable-btn position="0 -0.1 0.03" width="0.38" height="0.15" color="#FFFFFF" onclick="talkToRobot('Go away! You useless piece of junk!')">
                <a-text value="Scold" font="roboto" align="center" width="2" color="#222222"></a-text>
            </a-plane>

            <a-plane class="clickable" clickable-btn position="0.5 -0.1 0.03" width="0.38" height="0.15" color="#FFFFFF" onclick="talkToRobot('I lost my favorite toy today... I feel so down.')">
                <a-text value="Sad news" font="roboto" align="center" width="1.8" color="#222222"></a-text>
            </a-plane>

            <a-plane class="clickable" clickable-btn position="-0.25 -0.3 0.03" width="0.38" height="0.15" color="#FFFFFF" onclick="talkToRobot('Hello! Let\'s hang out in this beautiful field!')">
                <a-text value="Greet" font="roboto" align="center" width="2" color="#222222"></a-text>
            </a-plane>

            <a-plane class="clickable" clickable-btn position="0.25 -0.3 0.03" width="0.38" height="0.15" color="#FFFFFF" onclick="talkToRobot('Abracadabra 12345! What am I saying?')">
                <a-text value="Mystery" font="roboto" align="center" width="2" color="#222222"></a-text>
            </a-plane>
        </a-entity>

        <a-entity camera look-controls position="0 1.5 0">
            <a-cursor id="cursor"
                      raycaster="objects: .clickable"
                      fuse="true" 
                      fuse-timeout="1000"
                      color="#FF3E96"
                      geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.025"
                      position="0 0 -1">
            </a-cursor>
        </a-entity>
    </scene>

    <script>
        const API_KEY = "AQ.Ab8RN6KV_9pkC7l47CkDd3brktIQJkwi2YGs46igNTucVnOx4A"; 
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;

        const EMOTION_STATES = {
            "喜": { color: "#FFC65D", eyeScale: "1 1 1", eyeRotL: "0 0 10", eyeRotR: "0 0 -10", mouthSize: "0.22 0.12 0.01" },
            "怒": { color: "#EF2D5E", eyeScale: "1 0.4 1", eyeRotL: "0 0 -20", eyeRotR: "0 0 20", mouthSize: "0.15 0.03 0.01" },
            "哀": { color: "#4CC3D9", eyeScale: "0.6 1 1", eyeRotL: "0 0 25", eyeRotR: "0 0 -25", mouthSize: "0.1 0.02 0.01" },
            "楽": { color: "#7BC8A4", eyeScale: "1.3 0.3 1", eyeRotL: "0 0 0", eyeRotR: "0 0 0", mouthSize: "0.25 0.04 0.01" },
            "不": { color: "#A0A0A0", eyeScale: "0.8 0.8 1", eyeRotL: "0 0 15", eyeRotR: "0 0 15", mouthSize: "0.06 0.06 0.01" } 
        };

        async function talkToRobot(userMessage) {
            const vrRobotText = document.getElementById("vr-robot-text");
            vrRobotText.setAttribute("value", "Robot: Thinking...");

            const prompt = `
            You are an emotional robot. Respond to the user's input in short, concise ENGLISH. Keep your response under 30 characters.
            
            [CRITICAL RULE]
            Determine the emotion from the user's message: Joy (喜), Anger (怒), Sadness (哀), Fun (楽), or Confused (不).
            You MUST put the corresponding Japanese kanji tag 【喜】， 【怒】， 【哀】， 【楽】， or 【不】 at the VERY BEGINNING of your response text.
            
            Criteria:
            【喜】 User praises or thanks you.
            【怒】 User is aggressive, mean, or insults you.
            【哀】 User talks about sad or negative topics.
            【楽】 User is happy, positive, or gives a casual greeting.
            【不】 Inputs that make no sense, confusing questions, or fallback.
            
            User message:
            "${userMessage}"
            `;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text.trim();

                applyRobotState(aiResponse, vrRobotText);

            } catch (error) {
                console.error(error);
                applyRobotState("【不】Oops! Something went wrong.", vrRobotText);
            }
        }

        function applyRobotState(aiResponse, uiElement) {
            let emotion = "不"; 
            let cleanText = aiResponse;

            const match = aiResponse.match(/【(喜|怒|哀|楽|不)】/);
            if (match) {
                emotion = match[1];
                cleanText = aiResponse.replace(/【.*?】/, "").trim();
            }

            uiElement.setAttribute("value", "Robot: " + cleanText);

            const head = document.getElementById("robot-head");
            const body = document.getElementById("robot-body");
            const antenna = document.getElementById("robot-antenna-top");
            const eyeL = document.getElementById("eye-l");
            const eyeR = document.getElementById("eye-r");
            const mouth = document.getElementById("mouth");
            const questionMark = document.getElementById("robot-question-mark");

            const state = EMOTION_STATES[emotion];

            head.setAttribute("color", state.color);
            body.setAttribute("color", state.color);
            antenna.setAttribute("color", state.color);

            eyeL.setAttribute("scale", state.eyeScale);
            eyeR.setAttribute("scale", state.eyeScale);
            eyeL.setAttribute("rotation", state.eyeRotL);
            eyeR.setAttribute("rotation", state.eyeRotR);

            mouth.setAttribute("width", state.mouthSize.split(" ")[0]);
            mouth.setAttribute("height", state.mouthSize.split(" ")[1]);

            if (emotion === "不") {
                questionMark.setAttribute("scale", "1 1 1");
            } else {
                questionMark.setAttribute("scale", "0 0 0");
            }

            triggerFullBodyAnimation(emotion);
        }

        function triggerFullBodyAnimation(emotion) {
            const assembly = document.getElementById("robot-assembly");
            const masterContainer = document.getElementById("robot-master-container");
            const headGroup = document.getElementById("robot-head-group");
            const armL = document.getElementById("arm-l-container");
            const armR = document.getElementById("arm-r-container");
            const legL = document.getElementById("leg-l-container");
            const legR = document.getElementById("leg-r-container");

            const entities = [assembly, masterContainer, headGroup, armL, armR, legL, legR];
            entities.forEach(el => {
                el.removeAttribute("animation");
                el.setAttribute("rotation", "0 0 0");
            });
            masterContainer.setAttribute("position", "0 0 -2.5");

            if (emotion === "喜") {
                assembly.setAttribute("animation", `property: rotation; to: 0 360 0; dur: 1000; easing: easeInOutQuint; loop: 1`);
            } 
            else if (emotion === "怒") {
                masterContainer.setAttribute("animation", `property: position; from: 0 0 -2.5; to: 0 0.5 -2.5; dur: 250; easing: easeOutQuad; dir: alternate; loop: 4`);
            } 
            else if (emotion === "哀") {
                headGroup.setAttribute("animation", `property: rotation; to: 30 0 0; dur: 800; easing: easeOutQuad; loop: 1`);
            } 
            else if (emotion === "楽") {
                armL.setAttribute("animation", `property: rotation; from: 0 0 0; to: 0 0 110; dur: 500; easing: easeOutBack; loop: 1`);
                legR.setAttribute("animation", `property: rotation; from: 0 0 0; to: -60 0 0; dur: 500; easing: easeOutBack; loop: 1`);
            }
            else if (emotion === "不") {
                headGroup.setAttribute("animation", `property: rotation; to: 0 0 -20; dur: 600; easing: easeInOutQuad; loop: 1`);
            }
        }
    </script>
</body>
</html>
