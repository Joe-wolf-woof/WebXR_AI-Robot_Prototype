<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>5つの感情表現ロボット【WebXR】</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>

  <a-scene xr-mode-ui="enabled: true">
    
    <a-sphere position="5 8 -5" radius="1.2" color="#FFD700" material="shader: flat"></a-sphere>
    
    <a-entity light="type: directional; color: #FFF; intensity: 0.8; castShadow: true;" position="5 8 -5"></a-entity>
    
    <a-entity light="type: ambient; color: #BBB"></a-entity>

    <a-entity id="robot" position="0 0 -1.5">
      <a-sphere position="0 1.1 0" radius="0.25" color="#ECEFF1"></a-sphere>
      <a-sphere position="-0.08 1.15 0.2" radius="0.03" color="#00E5FF"></a-sphere>
      <a-sphere position="0.08 1.15 0.2" radius="0.03" color="#00E5FF"></a-sphere>
      <a-cylinder position="0 0.6 0" radius="0.2" height="0.5" color="#B0BEC5"></a-cylinder>
      <a-box position="-0.3 0.6 0" width="0.08" height="0.4" depth="0.08" color="#90A4AE"></a-box>
      <a-box position="0.3 0.6 0" width="0.08" height="0.4" depth="0.08" color="#90A4AE"></a-box>
      <a-cylinder position="-0.1 0.2 0" radius="0.05" height="0.4" color="#78909C"></a-cylinder>
      <a-cylinder position="0.1 0.2 0" radius="0.05" height="0.4" color="#78909C"></a-cylinder>
    </a-entity>

    <a-entity id="ui-panel" position="0 1.6 -1" rotation="10 0 0">
      <a-plane width="1.2" height="0.4" color="#263238" material="transparent: true; opacity: 0.85"></a-plane>
      <a-text id="robot-text" value="Robot: Look at the options and select!" 
              align="center" position="0 0 0.01" width="1.1" color="#FFFFFF"></a-text>
    </a-entity>

    <a-entity id="options-container" position="0 0.5 -1">
      <a-entity id="btn-praise" class="clickable" position="-0.3 0 0">
        <a-box width="0.25" height="0.12" depth="0.05" color="#4CAF50"></a-box>
        <a-text value="Praise" align="center" position="0 0 0.03" width="0.8" color="#FFF"></a-text>
      </a-entity>

      <a-entity id="btn-scold" class="clickable" position="0.3 0 0">
        <a-box width="0.25" height="0.12" depth="0.05" color="#F44336"></a-box>
        <a-text value="Scold" align="center" position="0 0 0.03" width="0.8" color="#FFF"></a-text>
      </a-entity>
    </a-entity>

    <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#4CAF50"></a-plane>

    <script>
      const scene = document.querySelector('a-scene');
      const flowerCount = 1000; // 1000本に制限

      for (let i = 0; i < flowerCount; i++) {
        const flowerGroup = document.createElement('a-entity');
        
        // ランダムな位置（ロボットの足元周辺を避ける）
        let x, z;
        do {
          x = (Math.random() - 0.5) * 30;
          z = (Math.random() - 0.5) * 30;
        } while (Math.sqrt(x*x + z*z) < 2); // ロボットから半径2m以内には生やさない

        flowerGroup.setAttribute('position', `${x} 0 ${z}`);

        // 茎
        const stem = document.createElement('a-cylinder');
        stem.setAttribute('radius', '0.005');
        stem.setAttribute('height', '0.2');
        stem.setAttribute('color', '#2E7D32');
        stem.setAttribute('position', '0 0.1 0');
        flowerGroup.appendChild(stem);

        // 葉っぱ1（サイズ2倍: radius=0.006, height=0.08）
        const leaf1 = document.createElement('a-cylinder');
        leaf1.setAttribute('radius', '0.006');
        leaf1.setAttribute('height', '0.08');
        leaf1.setAttribute('color', '#4CAF50');
        leaf1.setAttribute('position', '-0.02 0.08 0');
        leaf1.setAttribute('rotation', '0 0 45');
        flowerGroup.appendChild(leaf1);

        // 葉っぱ2（サイズ2倍: radius=0.006, height=0.08）
        const leaf2 = document.createElement('a-cylinder');
        leaf2.setAttribute('radius', '0.006');
        leaf2.setAttribute('height', '0.08');
        leaf2.setAttribute('color', '#4CAF50');
        leaf2.setAttribute('position', '0.02 0.12 0');
        leaf2.setAttribute('rotation', '0 0 -45');
        flowerGroup.appendChild(leaf2);

        // 花びら（薄い円柱3つを重ねてアスタリスク形状にして軽量化）
        const colors = ['#FFEB3B', '#FF4081', '#00E676', '#FF9100', '#2979FF'];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];

        for (let j = 0; j < 3; j++) {
          const petal = document.createElement('a-cylinder');
          petal.setAttribute('radius', '0.04');  // 2倍のサイズ
          petal.setAttribute('height', '0.004');
          petal.setAttribute('color', randomColor);
          petal.setAttribute('position', '0 0.2 0');
          petal.setAttribute('rotation', `90 ${j * 60} 0`); // 60度ずつずらして重ねる
          flowerGroup.appendChild(petal);
        }

        // 花の中心（中心の黄色いポンポン）
        const center = document.createElement('a-sphere');
        center.setAttribute('radius', '0.016'); // 2倍のサイズ
        center.setAttribute('color', '#FFD54F');
        center.setAttribute('position', '0 0.2 0.003');
        flowerGroup.appendChild(center);

        scene.appendChild(flowerGroup);
      }
    </script>

    <a-entity camera look-controls position="0 1.6 0">
      <a-cursor id="cursor"
                animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"
                animation__fusing="property: fusing; startEvents: fusing; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1500"
                event-set__mouseenter="_event: mouseenter; color: springgreen"
                event-set__mouseleave="_event: mouseleave; color: black"
                raycaster="objects: .clickable">
      </a-cursor>
    </a-entity>

  </a-scene>

  <script>
    const robot = document.getElementById('robot');
    const robotText = document.getElementById('robot-text');

    // 「褒める」ボタンを選択したとき
    document.getElementById('btn-praise').addEventListener('click', () => {
      robotText.setAttribute('value', 'Robot: Thank you! I am happy!');
      // 喜びのモーション（ピョンピョン跳ねる）
      robot.removeAttribute('animation');
      robot.setAttribute('animation', 'property: position; to: 0 0.3 -1.5; dur: 300; dir: alternate; loop: 4; easing: easeInOutQuad');
    });

    // 「叱る」ボタンを選択したとき
    document.getElementById('btn-scold').addEventListener('click', () => {
      robotText.setAttribute('value', 'Robot: Sorry... I will do my best.');
      // 悲しみのモーション（ガタガタ震えてうつむく）
      robot.removeAttribute('animation');
      robot.setAttribute('animation', 'property: rotation; to: 5 0 3; dur: 100; dir: alternate; loop: 6');
    });
  </script>
</body>
</html>
